# Docker Compose override for Zscaler vendor plugin.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.vendor.yml up --build -d
#   (or use: make vendor-up)

services:
  vendor-zscaler:
    build: ./vendors/zscaler
    networks:
      - net-dmz
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  aomc-control-plane:
    environment:
      # 1. Agent Identity & Attestation
      VENDOR_IDENTITY_ATTESTATION_URL: http://vendor-zscaler:8100/check
      VENDOR_IDENTITY_ATTESTATION_NAME: "Zscaler Zero Trust Exchange"
      # 2. Runtime Monitoring
      VENDOR_RUNTIME_MONITORING_URL: http://vendor-zscaler:8100/check
      VENDOR_RUNTIME_MONITORING_NAME: "Zscaler AI Guard"
      # 3. Data Guardrails
      VENDOR_DATA_GUARDRAILS_URL: http://vendor-zscaler:8100/check
      VENDOR_DATA_GUARDRAILS_NAME: "Zscaler AI Guard"
      # 4. Zero-Trust Enforcement
      VENDOR_ZERO_TRUST_URL: http://vendor-zscaler:8100/check
      VENDOR_ZERO_TRUST_NAME: "Zscaler Zero Trust Exchange"
      # 5. Tool Authorization
      VENDOR_TOOL_AUTHORIZATION_URL: http://vendor-zscaler:8100/check
      VENDOR_TOOL_AUTHORIZATION_NAME: "Zscaler AI-SPM"
      # 6. Autonomy Governance
      VENDOR_AUTONOMY_GOVERNANCE_URL: http://vendor-zscaler:8100/check
      VENDOR_AUTONOMY_GOVERNANCE_NAME: "Zscaler AI-SPM"
